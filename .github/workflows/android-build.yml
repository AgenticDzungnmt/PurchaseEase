name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME 2>&1 | tail -5 || true

      - name: Install npm dependencies
        run: npm install

      - name: Copy appConfig
        run: cp src/config/appConfig.example.ts src/config/appConfig.ts

      - name: Extract Android template from react-native release
        run: |
          echo "=== Downloading react-native 0.74.5 source tarball ==="
          cd /tmp
          curl -L -o rn.tar.gz \
            https://github.com/facebook/react-native/archive/refs/tags/v0.74.5.tar.gz

          echo "=== Extracting template/android ==="
          tar xzf rn.tar.gz \
            --wildcards \
            "react-native-0.74.5/template/android/*"

          echo "=== Copying android/ to workspace ==="
          cp -r react-native-0.74.5/template/android "$GITHUB_WORKSPACE/android"

          cd "$GITHUB_WORKSPACE"

          echo "=== Renaming package directories ==="
          SRC="android/app/src/main/java/com"
          if [ -d "$SRC/helloworld" ]; then
            mkdir -p "$SRC/purchaseease"
            mv "$SRC/helloworld"/* "$SRC/purchaseease"/
            rm -rf "$SRC/helloworld"
          fi
          if [ -d "$SRC/androidhelloworld" ]; then
            mkdir -p "$SRC/purchaseease"
            mv "$SRC/androidhelloworld"/* "$SRC/purchaseease"/ 2>/dev/null || true
            rm -rf "$SRC/androidhelloworld"
          fi

          echo "=== Replacing template placeholders ==="
          find android -type f \( \
            -name "*.gradle" -o -name "*.gradle.kts" -o \
            -name "*.xml" -o -name "*.kt" -o -name "*.java" -o \
            -name "*.properties" -o -name "*.pro" \
          \) | while IFS= read -r f; do
            sed -i \
              -e 's/HelloWorld/PurchaseEase/g' \
              -e 's/com\.helloworld/com.purchaseease/g' \
              -e 's/helloworld/purchaseease/g' \
              "$f"
          done

          echo "=== Patching NDK version ==="
          # 26.3.11579264 is pre-installed on ubuntu-latest runners
          sed -i \
            's/ndkVersion = "[^"]*"/ndkVersion = "26.3.11579264"/' \
            android/build.gradle

          chmod +x android/gradlew

          echo "=== Verification ==="
          grep -r "ndkVersion" android/build.gradle || true
          grep -r "applicationId" android/app/build.gradle || true
          find android/app/src/main/java -name "*.kt" -o -name "*.java" | head -10

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            2>&1 | tee /tmp/gradle-build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PurchaseEase-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3
