name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK platform & build tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME || true

      - name: Install npm dependencies
        run: npm install

      - name: Copy appConfig
        run: cp src/config/appConfig.example.ts src/config/appConfig.ts

      - name: Scaffold Android project
        run: |
          # Generate android/ directory using the installed react-native CLI
          npx react-native@0.74.5 init PurchaseEaseTemp \
            --version 0.74.5 \
            --skip-git-init \
            --skip-install \
            --directory /tmp/rntemp
          # Copy the generated android/ into our project
          cp -r /tmp/rntemp/android ./android

      - name: Re-run npm install with android folder present
        run: npm install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -PANDROID_HOME=$ANDROID_HOME \
            2>&1 | tee /tmp/gradle-build.log
          echo "Exit code: $?"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PurchaseEase-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3
